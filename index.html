document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"c71c9fcd-addb-4728-b201-dbe7866556aa\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>/* ============================================================\n   AdvocaAI — Landing Page\n   Navy / Gold / Cream — Luxury Refined + Institutional Authority\n   ============================================================ */\n\n:root {\n  --navy: #0A1628;\n  --navy-2: #0d1d35;\n  --royal: #1B3A6B;\n  --gold: #C9A84C;\n  --gold-light: #E8D5A3;\n  --gold-deep: #A8873A;\n  --cream: #F5F1EB;\n  --cream-2: #EFE9DF;\n  --ink: #1A1A1A;\n  --ink-soft: #4a4a4a;\n  --line-cream: rgba(26, 26, 26, 0.10);\n  --line-dark: rgba(201, 168, 76, 0.22);\n\n  --serif: \"Playfair Display\", Georgia, serif;\n  --sans: \"DM Sans\", system-ui, -apple-system, sans-serif;\n  --editorial: \"Cormorant Garamond\", Georgia, serif;\n\n  --maxw: 1200px;\n  --gutter: clamp(20px, 5vw, 64px);\n  --radius: 4px;\n  --shadow-gold: 0 18px 40px -18px rgba(201, 168, 76, 0.45);\n  --shadow-soft: 0 24px 60px -28px rgba(10, 22, 40, 0.35);\n  --ease: cubic-bezier(0.22, 1, 0.36, 1);\n}\n\n* { box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  margin: 0;\n  font-family: var(--sans);\n  font-weight: 400;\n  color: var(--ink);\n  background: var(--cream);\n  line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n  /* Subtle parchment texture */\n  background-image:\n    radial-gradient(circle at 20% 12%, rgba(201,168,76,0.04), transparent 42%),\n    radial-gradient(circle at 86% 78%, rgba(27,58,107,0.04), transparent 46%);\n}\n\nimg { max-width: 100%; display: block; }\n\na { color: inherit; text-decoration: none; }\n\nh1, h2, h3 { margin: 0; font-family: var(--serif); font-weight: 800; letter-spacing: -0.01em; }\n\np { margin: 0; }\n\n::selection { background: var(--gold); color: var(--navy); }\n\n/* ---------- Layout helpers ---------- */\n.wrap { max-width: var(--maxw); margin: 0 auto; padding-inline: var(--gutter); }\n\n.section { padding-block: clamp(64px, 9vw, 132px); position: relative; }\n\n.eyebrow {\n  font-family: var(--sans);\n  font-weight: 500;\n  font-size: 0.78rem;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--gold-deep);\n  display: inline-flex;\n  align-items: center;\n  gap: 12px;\n}\n.eyebrow::before {\n  content: \"\";\n  width: 28px; height: 1px;\n  background: var(--gold);\n  display: inline-block;\n}\n.eyebrow.center::before { display: none; }\n\n/* Section heading with animated gold underline */\n.h2 {\n  font-size: clamp(2rem, 4vw, 3.1rem);\n  line-height: 1.08;\n  position: relative;\n  display: inline-block;\n}\n.h2::after {\n  content: \"\";\n  position: absolute;\n  left: 0; bottom: -14px;\n  height: 3px; width: 0;\n  background: linear-gradient(90deg, var(--gold), var(--gold-light));\n  transition: width 0.9s var(--ease) 0.15s;\n}\n.is-visible .h2::after,\n.h2.is-visible::after { width: clamp(72px, 12vw, 120px); }\n\n.lede {\n  font-family: var(--editorial);\n  font-style: italic;\n  font-size: clamp(1.15rem, 1.6vw, 1.4rem);\n  color: var(--ink-soft);\n  line-height: 1.55;\n}\n\n/* ---------- Buttons ---------- */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--sans);\n  font-weight: 500;\n  font-size: 0.98rem;\n  padding: 15px 26px;\n  border-radius: var(--radius);\n  border: 1px solid transparent;\n  cursor: pointer;\n  transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease), background 0.3s, color 0.3s, border-color 0.3s;\n  white-space: nowrap;\n}\n.btn svg { width: 18px; height: 18px; }\n.btn-gold {\n  background: linear-gradient(135deg, var(--gold-light), var(--gold));\n  color: var(--navy);\n  box-shadow: var(--shadow-gold);\n}\n.btn-gold:hover { transform: translateY(-3px); box-shadow: 0 24px 48px -18px rgba(201,168,76,0.6); }\n.btn-outline {\n  background: transparent;\n  color: var(--cream);\n  border-color: rgba(245,241,235,0.35);\n}\n.btn-outline:hover { border-color: var(--gold); color: var(--gold-light); transform: translateY(-3px); }\n.btn-outline.dark { color: var(--navy); border-color: rgba(10,22,40,0.3); }\n.btn-outline.dark:hover { border-color: var(--gold-deep); color: var(--gold-deep); }\n\n/* ============================================================\n   HEADER\n   ============================================================ */\n.site-header {\n  position: fixed;\n  inset: 0 0 auto 0;\n  z-index: 100;\n  transition: background 0.4s, box-shadow 0.4s, padding 0.4s;\n  padding-block: 22px;\n}\n.site-header.scrolled {\n  background: rgba(10, 22, 40, 0.82);\n  backdrop-filter: blur(14px);\n  -webkit-backdrop-filter: blur(14px);\n  box-shadow: 0 1px 0 rgba(201,168,76,0.18);\n  padding-block: 12px;\n}\n.header-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; }\n\n.logo { display: flex; align-items: center; gap: 11px; color: var(--cream); }\n.logo svg { width: 30px; height: 30px; color: var(--gold); }\n.logo-text { font-family: var(--serif); font-weight: 800; font-size: 1.5rem; letter-spacing: -0.01em; }\n.logo-text b { color: var(--gold); font-weight: 800; }\n\n.nav { display: flex; align-items: center; gap: 34px; }\n.nav-links { display: flex; gap: 30px; list-style: none; margin: 0; padding: 0; }\n.nav-links a {\n  font-size: 0.92rem;\n  color: rgba(245,241,235,0.86);\n  font-weight: 400;\n  position: relative;\n  padding-block: 4px;\n}\n.nav-links a::after {\n  content: \"\"; position: absolute; left: 0; bottom: 0;\n  width: 0; height: 1.5px; background: var(--gold);\n  transition: width 0.3s var(--ease);\n}\n.nav-links a:hover { color: var(--gold-light); }\n.nav-links a:hover::after { width: 100%; }\n\n.nav-cta { padding: 11px 20px; font-size: 0.9rem; }\n\n.hamburger {\n  display: none;\n  flex-direction: column;\n  gap: 5px;\n  background: none; border: none; cursor: pointer;\n  padding: 8px; z-index: 110;\n}\n.hamburger span { width: 26px; height: 2px; background: var(--cream); transition: 0.3s var(--ease); }\n.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }\n.hamburger.open span:nth-child(2) { opacity: 0; }\n.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }\n\n/* ============================================================\n   HERO\n   ============================================================ */\n.hero {\n  min-height: 100svh;\n  display: flex;\n  align-items: center;\n  position: relative;\n  overflow: hidden;\n  background:\n    linear-gradient(120deg, var(--navy) 0%, var(--navy) 42%, var(--royal) 130%);\n  color: var(--cream);\n  padding-top: 90px;\n}\n.hero::before {\n  /* geometric gold pattern */\n  content: \"\";\n  position: absolute; inset: 0;\n  background-image:\n    linear-gradient(rgba(201,168,76,0.05) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(201,168,76,0.05) 1px, transparent 1px);\n  background-size: 64px 64px;\n  -webkit-mask-image: radial-gradient(circle at 70% 30%, #000, transparent 72%);\n  mask-image: radial-gradient(circle at 70% 30%, #000, transparent 72%);\n  opacity: 0.6;\n}\n.hero-grid {\n  display: grid;\n  grid-template-columns: 1.05fr 0.95fr;\n  gap: clamp(32px, 5vw, 72px);\n  align-items: center;\n  position: relative;\n  width: 100%;\n}\n.hero-copy { max-width: 600px; }\n.hero h1 {\n  font-size: clamp(2.7rem, 5.6vw, 4.6rem);\n  line-height: 1.02;\n  margin: 22px 0 24px;\n  color: #fff;\n}\n.hero h1 em { font-style: normal; color: var(--gold-light); }\n.hero-sub {\n  font-weight: 300;\n  font-size: clamp(1.05rem, 1.5vw, 1.2rem);\n  color: rgba(245,241,235,0.78);\n  max-width: 480px;\n  line-height: 1.62;\n}\n.hero-ctas { display: flex; flex-wrap: wrap; gap: 16px; margin: 34px 0 38px; }\n.hero-stats { display: flex; flex-wrap: wrap; gap: 26px; }\n.hero-stat { display: flex; align-items: center; gap: 9px; font-size: 0.9rem; color: rgba(245,241,235,0.82); }\n.hero-stat svg { width: 16px; height: 16px; color: var(--gold); flex: none; }\n\n/* Editorial image placeholder */\n.placeholder {\n  position: relative;\n  border-radius: var(--radius);\n  background:\n    repeating-linear-gradient(135deg, rgba(201,168,76,0.10) 0 12px, transparent 12px 24px),\n    var(--navy-2);\n  border: 1px solid var(--line-dark);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  overflow: hidden;\n  color: var(--gold-light);\n}\n.placeholder span {\n  font-family: \"SF Mono\", ui-monospace, Menlo, monospace;\n  font-size: 0.72rem;\n  letter-spacing: 0.06em;\n  color: rgba(201,168,76,0.7);\n  background: rgba(10,22,40,0.6);\n  padding: 6px 12px;\n  border: 1px solid var(--line-dark);\n  border-radius: 2px;\n  text-align: center;\n}\n.placeholder.light {\n  background:\n    repeating-linear-gradient(135deg, rgba(10,22,40,0.06) 0 12px, transparent 12px 24px),\n    var(--cream-2);\n  border-color: var(--line-cream);\n}\n.placeholder.light span { color: var(--ink-soft); background: rgba(255,255,255,0.7); border-color: var(--line-cream); }\n\n.hero-image {\n  aspect-ratio: 4 / 5;\n  box-shadow: var(--shadow-soft);\n  position: relative;\n  margin: 0;\n  overflow: hidden;\n  border-radius: var(--radius);\n  border: 1px solid var(--line-dark);\n}\n.hero-image img, .about-img img { width: 100%; height: 100%; object-fit: cover; display: block; }\n.hero-image .frame-tag {\n  position: absolute; left: 18px; bottom: 18px;\n  background: rgba(10,22,40,0.85);\n  border: 1px solid var(--line-dark);\n  padding: 12px 16px; border-radius: 3px;\n  display: flex; align-items: center; gap: 12px;\n}\n.hero-image .frame-tag svg { width: 26px; height: 26px; color: var(--gold); }\n.hero-image .frame-tag b { font-family: var(--serif); font-size: 1.4rem; color: #fff; display: block; line-height: 1; }\n.hero-image .frame-tag small { font-size: 0.7rem; color: rgba(245,241,235,0.7); letter-spacing: 0.08em; text-transform: uppercase; }\n\n/* ============================================================\n   SOBRE\n   ============================================================ */\n.about-grid {\n  display: grid;\n  grid-template-columns: 0.9fr 1.1fr;\n  gap: clamp(36px, 6vw, 80px);\n  align-items: center;\n}\n.about-img {\n  aspect-ratio: 3 / 4;\n  margin: 0;\n  overflow: hidden;\n  border-radius: var(--radius);\n  border: 1px solid var(--line-cream);\n  box-shadow: var(--shadow-soft);\n}\n.about-copy { position: relative; padding-left: 34px; }\n.about-copy::before {\n  content: \"\"; position: absolute; left: 0; top: 6px; bottom: 6px;\n  width: 2px; background: linear-gradient(var(--gold), transparent);\n}\n.about-copy .h2 { margin-bottom: 30px; }\n.about-text p { margin-bottom: 18px; color: var(--ink-soft); max-width: 50ch; }\n.about-text p.intro { font-family: var(--editorial); font-style: italic; font-size: 1.25rem; color: var(--ink); }\n\n.pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; margin-top: 38px; }\n.pillar { }\n.pillar svg { width: 30px; height: 30px; color: var(--gold-deep); margin-bottom: 12px; }\n.pillar h3 { font-family: var(--sans); font-weight: 500; font-size: 1rem; letter-spacing: -0.01em; }\n\n/* ============================================================\n   SERVIÇOS\n   ============================================================ */\n.section-head { max-width: 640px; margin-bottom: 56px; }\n.section-head.center { margin-inline: auto; text-align: center; }\n.section-head .h2 { margin: 18px 0 16px; }\n.section-head p { color: var(--ink-soft); font-size: 1.08rem; }\n\n.services-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 24px;\n}\n.service-card {\n  background: #fff;\n  border: 1px solid var(--line-cream);\n  border-top: 2px solid var(--gold);\n  border-radius: var(--radius);\n  padding: 34px 30px 30px;\n  transition: transform 0.4s var(--ease), box-shadow 0.4s var(--ease), border-color 0.4s;\n  position: relative;\n}\n.service-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-gold); }\n.service-icon {\n  width: 54px; height: 54px;\n  display: flex; align-items: center; justify-content: center;\n  border-radius: 50%;\n  background: var(--cream);\n  border: 1px solid var(--line-cream);\n  margin-bottom: 20px;\n}\n.service-icon svg { width: 26px; height: 26px; color: var(--royal); }\n.service-card h3 { font-size: 1.4rem; margin-bottom: 12px; }\n.service-card p { color: var(--ink-soft); font-size: 0.96rem; margin-bottom: 20px; }\n.card-link {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-weight: 500; font-size: 0.88rem; color: var(--gold-deep);\n  letter-spacing: 0.02em;\n}\n.card-link svg { width: 16px; height: 16px; transition: transform 0.3s var(--ease); }\n.service-card:hover .card-link svg { transform: translateX(5px); }\n\n/* ============================================================\n   PROCESSO\n   ============================================================ */\n.process { background: var(--cream-2); }\n.process-grid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 28px;\n  margin-top: 56px;\n  position: relative;\n}\n.process-grid::before {\n  content: \"\"; position: absolute; top: 26px; left: 8%; right: 8%;\n  height: 2px;\n  background: repeating-linear-gradient(90deg, var(--gold) 0 10px, transparent 10px 20px);\n  opacity: 0.5;\n}\n.step { position: relative; }\n.step-num {\n  width: 54px; height: 54px; border-radius: 50%;\n  background: var(--navy); color: var(--gold-light);\n  font-family: var(--serif); font-size: 1.5rem; font-weight: 800;\n  display: flex; align-items: center; justify-content: center;\n  margin-bottom: 22px;\n  position: relative; z-index: 1;\n  box-shadow: 0 0 0 6px var(--cream-2);\n}\n.step h3 { font-size: 1.2rem; margin-bottom: 10px; letter-spacing: 0.02em; text-transform: uppercase; font-size: 0.95rem; font-family: var(--sans); font-weight: 600; color: var(--royal); }\n.step p { color: var(--ink-soft); font-size: 0.96rem; }\n\n/* ============================================================\n   PROVA SOCIAL\n   ============================================================ */\n.proof { background: var(--navy); color: var(--cream); overflow: hidden; position: relative; }\n.proof::before {\n  content: \"\"; position: absolute; inset: 0;\n  background-image: radial-gradient(circle at 15% 20%, rgba(201,168,76,0.10), transparent 40%);\n}\n.proof-inner { position: relative; }\n.proof .h2 { color: #fff; }\n.proof-head { max-width: 560px; margin-bottom: 56px; }\n.stats-row {\n  display: grid; grid-template-columns: repeat(4, 1fr);\n  gap: 30px;\n  padding-block: 14px 56px;\n  border-bottom: 1px solid var(--line-dark);\n  margin-bottom: 56px;\n}\n.stat-num {\n  font-family: var(--serif); font-weight: 800;\n  font-size: clamp(2.4rem, 4.5vw, 3.4rem);\n  color: var(--gold-light); line-height: 1;\n}\n.stat-label { font-size: 0.9rem; color: rgba(245,241,235,0.66); margin-top: 12px; }\n\n.testimonials { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }\n.testimonial {\n  background: rgba(255,255,255,0.03);\n  border: 1px solid var(--line-dark);\n  border-radius: var(--radius);\n  padding: 32px 28px;\n}\n.testimonial .quote-mark { font-family: var(--serif); font-size: 3.4rem; color: var(--gold); line-height: 0.6; height: 28px; display: block; }\n.testimonial p { font-family: var(--editorial); font-style: italic; font-size: 1.18rem; color: rgba(245,241,235,0.92); line-height: 1.5; margin-bottom: 22px; }\n.testimonial cite { font-style: normal; font-weight: 500; font-size: 0.92rem; color: var(--gold-light); }\n.testimonial .stars { display: flex; gap: 3px; margin-bottom: 18px; }\n.testimonial .stars svg { width: 16px; height: 16px; color: var(--gold); }\n\n/* ============================================================\n   FAQ\n   ============================================================ */\n.faq-list { max-width: 820px; margin-top: 50px; }\n.faq-item { border-bottom: 1px solid var(--line-cream); }\n.faq-item:first-child { border-top: 1px solid var(--line-cream); }\n.faq-q {\n  width: 100%; background: none; border: none; cursor: pointer;\n  display: flex; align-items: center; justify-content: space-between; gap: 24px;\n  padding: 26px 4px;\n  font-family: var(--serif); font-weight: 700; font-size: clamp(1.1rem, 2vw, 1.35rem);\n  color: var(--ink); text-align: left;\n  transition: color 0.3s;\n}\n.faq-q:hover { color: var(--gold-deep); }\n.faq-icon { flex: none; width: 26px; height: 26px; position: relative; }\n.faq-icon::before, .faq-icon::after {\n  content: \"\"; position: absolute; background: var(--gold-deep);\n  transition: transform 0.35s var(--ease);\n}\n.faq-icon::before { top: 12px; left: 3px; right: 3px; height: 2px; }\n.faq-icon::after { left: 12px; top: 3px; bottom: 3px; width: 2px; }\n.faq-item.open .faq-icon::after { transform: scaleY(0); }\n.faq-a { max-height: 0; overflow: hidden; transition: max-height 0.45s var(--ease); }\n.faq-a p { padding: 0 4px 28px; color: var(--ink-soft); max-width: 64ch; }\n\n/* ============================================================\n   CTA FINAL\n   ============================================================ */\n.final-cta {\n  background:\n    linear-gradient(135deg, var(--navy) 0%, var(--royal) 100%);\n  color: var(--cream);\n  text-align: center;\n  position: relative; overflow: hidden;\n}\n.final-cta::before {\n  content: \"\"; position: absolute; inset: 0;\n  background-image:\n    linear-gradient(rgba(201,168,76,0.06) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(201,168,76,0.06) 1px, transparent 1px);\n  background-size: 48px 48px;\n  -webki
